services:
  frontend:
    image: node:22-bullseye-slim
    restart: unless-stopped
    working_dir: /app
    command: sh -lc "corepack enable && corepack prepare pnpm@9.15.9 --activate && npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_started

  # Optional: local Qwen2.5-VL via Ollama (free, runs on your machine).
  # Start it with: docker compose --profile qwen up -d ollama
  ollama:
    profiles: ["qwen"]
    image: ollama/ollama:latest
    # 11434 is often used by a host ollama install; map to 11435 to avoid conflicts.
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_next:
  ollama_data:
